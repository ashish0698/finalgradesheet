<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trishaheed Secondary School - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Poppins',sans-serif;
  background:url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
  position:relative;
  overflow:hidden;
}

/* Dark Transparent Overlay */
body::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.55);
  z-index:0;
}

/* Top Time */
.top-time{
  position:absolute;
  top:15px;
  right:25px;
  color:white;
  font-size:14px;
  z-index:2;
}

/* Login Card Animation */
.login-card{
  width:420px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  border-radius:15px;
  padding:40px;
  color:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  text-align:center;
  z-index:2;
  animation:fadeUp 1s ease;
}

/* Entrance Animation */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

/* School Name Animation */
.school-name{
  font-size:22px;
  font-weight:600;
  margin-bottom:5px;
  animation:slideIn 1.2s ease;
}

@keyframes slideIn{
  from{opacity:0; transform:translateX(-40px);}
  to{opacity:1; transform:translateX(0);}
}

.subtitle{
  font-size:14px;
  margin-bottom:25px;
  opacity:0.9;
}

.login-card img{
  width:90px;
  margin-bottom:15px;
  animation:zoomIn 1s ease;
}

@keyframes zoomIn{
  from{transform:scale(0.7); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

.form-control{
  background:rgba(255,255,255,0.2);
  border:none;
  color:white;
}

.form-control::placeholder{
  color:#eee;
}

.form-control:focus{
  box-shadow:none;
  background:rgba(255,255,255,0.3);
  color:white;
}

.btn-login{
  background:#ffc107;
  border:none;
  font-weight:600;
  transition:0.3s;
}

.btn-login:hover{
  background:#ffb300;
  transform:scale(1.05);
}

</style>
</head>
<body>

<div class="top-time" id="dateTime"></div>

<div class="login-card">

  <img src="school_logo.png" alt="School Logo">

  <div class="school-name">Trishaheed Secondary School</div>
  <div class="subtitle">Examination Management System</div>

  <input type="text" id="username" class="form-control mb-3" placeholder="Username">
  <input type="password" id="password" class="form-control mb-4" placeholder="Password">

  <button onclick="login()" class="btn btn-login w-100">Login</button>

  <p id="error" class="text-warning mt-3"></p>

</div>

<script>

/* Real Time Clock + Date */
function updateTime(){
  const now=new Date();
  const options={weekday:'long', year:'numeric', month:'long', day:'numeric'};
  const date=now.toLocaleDateString('en-US',options);
  const time=now.toLocaleTimeString();
  document.getElementById("dateTime").innerHTML=
  `<i class="fa fa-calendar"></i> ${date} &nbsp; 
   <i class="fa fa-clock"></i> ${time}`;
}
setInterval(updateTime,1000);
updateTime();

/* Login */
function login(){
  const user=document.getElementById("username").value.trim();
  const pass=document.getElementById("password").value.trim();

  if(pass==="123" && user!==""){
    localStorage.setItem("loggedIn","true");
    localStorage.setItem("username",user);
    window.location.href="dashboard.html";
  }else{
    document.getElementById("error").innerText=
    "Enter valid username and correct password";
  }
}

</script>

</body>
</html>
