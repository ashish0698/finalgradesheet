<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Gradesheet Generator</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>
body{
  background:linear-gradient(135deg,#eef2f7,#dbeafe);
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}

/* WATERMARK */
.card{
  border:none;
  border-radius:15px;
  position:relative;      /* 🔑 parent reference */
  min-height:85vh;        /* 🔑 gives space to center watermark */
  overflow:hidden;
  background:#fff;
}
.card-watermark{
  position:absolute;
  top:80%;
  left:40%;
  /* transform:translate(-50%, -50%) rotate(-25deg); */
  font-size:20px;
  font-weight:800;
  color:#1a4b8c;
  opacity:0.06;
  white-space:nowrap;
  pointer-events:none;
  user-select:none;
  z-index:0;
}



/* content stays above watermark */
#inputSection{
  position:relative;
  z-index:1;
}

h2{
  font-weight:bold;
  color:#1a4b8c;
}

.form-label{
  font-weight:600;
}

input{
  border-radius:10px !important;
}

table{
  border-radius:10px;
  overflow:hidden;
}

thead th{
  background:#1a4b8c;
  color:#fff;
  text-align:center;
}

tbody tr:hover{
  background:#f1f5ff;
}

.delete-btn{
  background:#dc3545;
  color:#fff;
  border:none;
  border-radius:50%;
  width:34px;
  height:34px;
  font-weight:bold;
  cursor:pointer;
}

.delete-btn:hover{
  background:#bb2d3b;
}

.btn-primary{
  background:#1a4b8c;
  border:none;
  border-radius:10px;
}

.btn-success{
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container mt-4 mb-5">
  <div class="card p-4 shadow-lg">  
    <div class="card-watermark">Created By Ashish Paudel</div>
    <h2 class="text-center mb-5">
      Tri-Shaheed Secondary School<br>
      <small class="text-muted fs-5">Student Gradesheet Generator</small>
    </h2>

    <div id="inputSection">

      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">Student Name</label>
          <input type="text" id="studentName" class="form-control">
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Class</label>
          <input type="text" id="studentClass" class="form-control">
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Roll No</label>
          <input type="text" id="rollNo" class="form-control">
        </div>

        <div class="col-md-4 mb-3">
        <label class="form-label">Terminal</label>
        <input type="text" id="terminal" class="form-control">
        </div>
      </div>
      

      <h5 class="mt-3 mb-2 fw-bold">Enter Subjects</h5>

      <table class="table table-bordered align-middle" id="subjectTable">
        <thead>
          <tr>
            <th>Subject Name</th>
            <th>Obtained Marks</th>
            <th>Credit Hour</th>
            <th>Full Marks</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><input type="text" class="form-control subName"></td>
            <td><input type="number" class="form-control subMarks"></td>
            <td><input type="number" class="form-control subCredit"></td>
            <td><input type="number" class="form-control subFull"></td>
            <td class="text-center">
              <button class="delete-btn" onclick="deleteRow(this)">×</button>
            </td>
          </tr>
        </tbody>
      </table>

      <button class="btn btn-primary w-100 mt-2" onclick="addRow()">
        ➕ Add Another Subject
      </button>

      <button type="button" class="btn btn-success w-100 mt-2" onclick="generateMarksheet()">
        📄 Generate Gradesheet
      </button>

    </div>
  </div>
</div>

<script>
function addRow() {
  let row = document.createElement("tr");
  row.innerHTML = `
    <td><input type="text" class="form-control subName"></td>
    <td><input type="number" class="form-control subMarks"></td>
    <td><input type="number" class="form-control subCredit"></td>
    <td><input type="number" class="form-control subFull"></td>
    <td class="text-center">
      <button class="delete-btn" onclick="deleteRow(this)">×</button>
    </td>
  `;
  document.querySelector("#subjectTable tbody").appendChild(row);
}

function deleteRow(btn){
  btn.closest("tr").remove();
}

function generateMarksheet() {
  const name = studentName.value.trim();
  const classname = studentClass.value.trim();
  const roll = rollNo.value.trim();
  const terminal = document.getElementById("terminal").value.trim(); // ✅ ADD THIS

  if(!name || !classname || !roll || !terminal){
    alert("Please fill all student details.");
    return;
  }

  const subNames = document.getElementsByClassName('subName');
  const subMarks = document.getElementsByClassName('subMarks');
  const subCredits = document.getElementsByClassName('subCredit');
  const subFull = document.getElementsByClassName('subFull');

  const subjects = [];

  for(let i=0;i<subNames.length;i++){
    if(!subNames[i].value || !subMarks[i].value || !subCredits[i].value || !subFull[i].value){
      alert("Please fill all subject fields.");
      return;
    }

    subjects.push({
      name: subNames[i].value,
      marks: subMarks[i].value,
      credit: subCredits[i].value,
      full: subFull[i].value
    });
  }

  // ✅ INCLUDE terminal here
  sessionStorage.setItem(
    'marksheetData',
    JSON.stringify({ name, classname, roll, terminal, subjects })
  );

  window.open('marksheet.html', '_blank');
}
</script>

</body>
</html>
